<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Embed Message</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h2>🔐 Embed Secret Message</h2>

    <form action="/api/stego/embed" method="post" enctype="multipart/form-data">

        <label>Select Image (PNG only)</label>
        <input type="file" name="file" accept="image/png" onchange="previewImage(event)" required>

        <img id="preview" class="preview"/>

        <label>Enter Secret Message</label>
        <textarea name="message" placeholder="Enter your message..." required></textarea>

        <button type="submit">Embed & Download</button>
    </form>

    <a href="/"><button class="back">⬅ Back</button></a>
</div>

<script src="/js/script.js"></script>

</body>
</html>
